services:
  spark-worker:
    image: apache/spark:3.5.4
    container_name: spark-worker1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://${MASTER_IP}:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    ports:
      - "8081:8081"
    volumes:
      - ./apps:/opt/spark-apps
      - ./data:/opt/spark-data
