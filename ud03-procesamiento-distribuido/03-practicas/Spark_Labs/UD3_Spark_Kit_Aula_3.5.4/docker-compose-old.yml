
services:
  spark-master:
    image: spark:3.5.4-scala2.12-java17-python3-ubuntu
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    #extra_hosts:
    #  - "spark-master:host-gateway"
    volumes:
      - ./data:/data
    working_dir: /home/spark
    user: root
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_LOCAL_HOSTNAME=spark-master
      - PATH=/opt/spark/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-master.sh && tail -f /dev/null" ]

  spark-worker-1:
    image: spark:3.5.4-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
    working_dir: /home/spark
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8081
      - PATH=/opt/spark/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=4g
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null" ]

  spark-worker-2:
    image: spark:3.5.4-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-2
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
    volumes:
      - ./data:/data
    working_dir: /home/spark
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8082
      - PATH=/opt/spark/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1g
    command: [ "/bin/bash", "-c", "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null" ]

networks:
  default:
    name: spark-network
    external: true

