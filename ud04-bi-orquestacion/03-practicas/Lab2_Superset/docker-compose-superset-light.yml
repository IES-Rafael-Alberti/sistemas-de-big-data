services:
  superset-db:
    image: postgres:17
    container_name: superset_db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - superset_net
    ports:
      - "5432:5432"

  superset-redis:
    image: redis:7
    container_name: superset_redis
    networks:
      - superset_net

  superset:
    image: apache/superset:latest
    container_name: superset_app
    depends_on:
      - superset-db
      - superset-redis
    environment:
      SUPERSET_SECRET_KEY: "clave_segura_para_clase"
      SUPERSET_DATABASE_URI: postgresql://superset:superset@superset-db:5432/superset
      PYTHONPATH: "/app/superset_home/.local/lib/python3.10/site-packages"
      # Redis (recomendado)
      REDIS_HOST: superset-redis
      REDIS_PORT: 6379
      CACHE_CONFIG: '{"CACHE_TYPE":"RedisCache","CACHE_DEFAULT_TIMEOUT":300,"CACHE_KEY_PREFIX":"superset_","CACHE_REDIS_HOST":"superset-redis","CACHE_REDIS_PORT":6379,"CACHE_REDIS_DB":1}'
      CELERY_CONFIG: '{"broker_url":"redis://superset-redis:6379/0","result_backend":"redis://superset-redis:6379/0"}'  
    ports:
      - "8088:8088"
    command: >
      bash -c "
      pip install psycopg2-binary &&
      superset db upgrade &&
      superset fab create-admin --username admin --firstname admin --lastname user --email admin@local --password admin &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    networks:
      - superset_net

volumes:
  superset_db_data:

networks:
  superset_net:
