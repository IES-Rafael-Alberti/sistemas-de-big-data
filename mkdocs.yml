site_name: Sistemas de Big Data
site_description: Material del módulo Sistemas de Big Data - Curso 2026/2027
site_url: https://ies-rafael-alberti.github.io/sistemas-de-big-data/
repo_url: https://github.com/IES-Rafael-Alberti/sistemas-de-big-data
repo_name: IES-Rafael-Alberti/sistemas-de-big-data
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# SOLO material para el alumnado.
# 99-profesor, 90-archivo, _profesor y datos quedan fuera.
exclude_docs: |
  **/90-archivo/
  **/99-profesor/
  **/_profesor/
  **/Presentaciones/
  **/README_Docente.md
  **/README_Ingesta.md
  *.py
  *.csv
  *.parquet
  *.zip
  *.tar.gz
  *.docx
  *.rmd
  *.Rhistory
  *.json
  *.gift
  *.gitignore
  *.gitattributes
  *.png
  *.jpg
  *.jpeg
  *.gif
  *.svg

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IES-Rafael-Alberti/sistemas-de-big-data

plugins:
  - search

hooks:
  - hooks/nav_generator.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: En esta página

# El nav se genera automáticamente desde hooks/nav_generator.py
# basado en los archivos .md de cada unidad.
nav:
  - Inicio: index.md
