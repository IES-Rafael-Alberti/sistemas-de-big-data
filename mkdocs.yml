site_name: Sistemas de Big Data
site_description: Material del módulo Sistemas de Big Data - Curso 2026/2027
site_url: https://ies-rafael-alberti.github.io/sistemas-de-big-data/
repo_url: https://github.com/IES-Rafael-Alberti/sistemas-de-big-data
repo_name: IES-Rafael-Alberti/sistemas-de-big-data
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# SOLO material para el alumnado.
# 99-profesor, 90-archivo, _profesor y datos quedan fuera.
exclude_docs: |
  **/90-archivo/
  **/99-profesor/
  **/_profesor/
  *.py
  *.csv
  *.parquet
  *.zip
  *.tar.gz
  *.docx
  *.rmd
  *.Rhistory
  *.json
  *.gift
  *.gitignore
  *.gitattributes
  *.png
  *.jpg
  *.jpeg
  *.gif
  *.svg

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IES-Rafael-Alberti/sistemas-de-big-data

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: En esta página

nav:
  - Inicio: index.md
  - UD1 — Introducción Big Data: ud01-introduccion-big-data/README.md
  - UD2 — Almacenamiento e ingesta: ud02-almacenamiento-ingesta/README.md
  - UD3 — Procesamiento distribuido: ud03-procesamiento-distribuido/README.md
  - UD4 — BI y orquestación: ud04-bi-orquestacion/README.md
  - UD5 — Spark MLlib: ud05-spark-mllib/README.md
  - UD6 — Proyecto integrador: ud06-proyecto/README.md
