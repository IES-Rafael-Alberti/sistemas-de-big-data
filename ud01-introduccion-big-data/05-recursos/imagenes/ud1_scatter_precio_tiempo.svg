<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Scatter plot precio_total frente a tiempo_entrega_h</title>
  <desc id="desc">Diagrama de dispersión con cinco puntos agrupados y un outlier que puede inducir una correlación engañosa.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Scatter plot: precio_total vs tiempo_entrega_h</text>
  <line x1="90" y1="340" x2="700" y2="340" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="340" x2="90" y2="70" stroke="#111827" stroke-width="2"/>
  <text x="395" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">precio_total (€)</text>
  <text x="28" y="205" transform="rotate(-90 28 205)" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">tiempo_entrega_h</text>

  <line x1="90" y1="286" x2="700" y2="286" stroke="#e5e7eb"/>
  <line x1="90" y1="232" x2="700" y2="232" stroke="#e5e7eb"/>
  <line x1="90" y1="178" x2="700" y2="178" stroke="#e5e7eb"/>
  <line x1="90" y1="124" x2="700" y2="124" stroke="#e5e7eb"/>
  <line x1="212" y1="70" x2="212" y2="340" stroke="#e5e7eb"/>
  <line x1="334" y1="70" x2="334" y2="340" stroke="#e5e7eb"/>
  <line x1="456" y1="70" x2="456" y2="340" stroke="#e5e7eb"/>
  <line x1="578" y1="70" x2="578" y2="340" stroke="#e5e7eb"/>

  <circle cx="105" cy="308" r="6" fill="#2563eb"/>
  <circle cx="99" cy="305" r="6" fill="#2563eb"/>
  <circle cx="108" cy="299" r="6" fill="#2563eb"/>
  <circle cx="116" cy="302" r="6" fill="#2563eb"/>
  <circle cx="107" cy="307" r="6" fill="#2563eb"/>
  <circle cx="680" cy="70" r="9" fill="#ef4444"/>

  <text x="126" y="285" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">ventas normales agrupadas</text>
  <text x="645" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b">outlier</text>
  <text x="410" y="88" font-family="Arial, sans-serif" font-size="14" fill="#374151">Un único punto extremo puede hacer parecer que hay una relación fuerte.</text>
  <text x="90" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">0</text>
  <text x="212" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">200</text>
  <text x="334" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">400</text>
  <text x="456" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">600</text>
  <text x="578" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">800</text>
  <text x="700" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">1000</text>
  <text x="74" y="344" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">0</text>
  <text x="74" y="276" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">50</text>
  <text x="74" y="209" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">100</text>
  <text x="74" y="141" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">150</text>
  <text x="74" y="74" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">200</text>
</svg>
