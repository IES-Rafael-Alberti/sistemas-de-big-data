<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Histograma de precio_total</title>
  <desc id="desc">Histograma con cinco ventas entre 0 y 50 euros y una venta extrema en 1000 euros.</desc>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Histograma: precio_total</text>
  <line x1="90" y1="340" x2="700" y2="340" stroke="#111827" stroke-width="2"/>
  <line x1="90" y1="340" x2="90" y2="70" stroke="#111827" stroke-width="2"/>
  <text x="395" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">precio_total (€)</text>
  <text x="28" y="205" transform="rotate(-90 28 205)" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">frecuencia</text>

  <line x1="90" y1="286" x2="700" y2="286" stroke="#e5e7eb"/>
  <line x1="90" y1="232" x2="700" y2="232" stroke="#e5e7eb"/>
  <line x1="90" y1="178" x2="700" y2="178" stroke="#e5e7eb"/>
  <line x1="90" y1="124" x2="700" y2="124" stroke="#e5e7eb"/>
  <text x="74" y="345" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">0</text>
  <text x="74" y="291" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">1</text>
  <text x="74" y="237" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">2</text>
  <text x="74" y="183" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">3</text>
  <text x="74" y="129" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">4</text>
  <text x="74" y="75" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">5</text>

  <rect x="120" y="70" width="92" height="270" fill="#4f46e5" opacity="0.85"/>
  <rect x="238" y="340" width="92" height="0" fill="#4f46e5" opacity="0.85"/>
  <rect x="356" y="340" width="92" height="0" fill="#4f46e5" opacity="0.85"/>
  <rect x="474" y="340" width="92" height="0" fill="#4f46e5" opacity="0.85"/>
  <rect x="592" y="286" width="92" height="54" fill="#ef4444" opacity="0.9"/>

  <text x="166" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">0-50</text>
  <text x="284" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">50-250</text>
  <text x="402" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">250-500</text>
  <text x="520" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">500-750</text>
  <text x="638" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">750-1000</text>
  <text x="166" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">5 ventas</text>
  <text x="638" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">outlier</text>
</svg>
