<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Boxplot de precio_total</title>
  <desc id="desc">Boxplot con Q1, mediana, Q3 y un outlier situado en 1000 euros.</desc>
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Boxplot: precio_total</text>
  <line x1="80" y1="260" x2="700" y2="260" stroke="#111827" stroke-width="2"/>
  <text x="390" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">precio_total (€)</text>

  <line x1="120" y1="250" x2="120" y2="270" stroke="#111827"/>
  <line x1="260" y1="250" x2="260" y2="270" stroke="#111827"/>
  <line x1="400" y1="250" x2="400" y2="270" stroke="#111827"/>
  <line x1="540" y1="250" x2="540" y2="270" stroke="#111827"/>
  <line x1="680" y1="250" x2="680" y2="270" stroke="#111827"/>
  <text x="120" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">0</text>
  <text x="260" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">250</text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">500</text>
  <text x="540" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">750</text>
  <text x="680" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">1000</text>

  <line x1="128" y1="155" x2="145" y2="155" stroke="#111827" stroke-width="3"/>
  <rect x="132" y="110" width="22" height="90" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="3"/>
  <line x1="141" y1="110" x2="141" y2="200" stroke="#1d4ed8" stroke-width="4"/>
  <line x1="128" y1="135" x2="128" y2="175" stroke="#111827" stroke-width="3"/>
  <line x1="155" y1="135" x2="155" y2="175" stroke="#111827" stroke-width="3"/>
  <circle cx="680" cy="155" r="8" fill="#ef4444"/>

  <text x="132" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">Q1</text>
  <text x="141" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">mediana</text>
  <text x="155" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">Q3</text>
  <text x="680" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">1000</text>
  <text x="680" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#991b1b">outlier</text>
  <text x="360" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">La caja queda concentrada cerca de 15-44; el valor 1000 queda aislado.</text>
</svg>
